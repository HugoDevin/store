<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Order Detail</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3">訂單詳情 #<span th:text="${order.id}"></span></h1><form th:if="${order.status == 'PENDING'}" th:action="@{'/buyer/orders/' + ${order.id} + '/cancel'}" method="post"><button class="btn btn-outline-danger">取消訂單</button></form></div><div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div><div class="row g-4"><div class="col-lg-4"><div class="card shadow-sm"><div class="card-body"><p>建立時間：<span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p><p>狀態：<span th:text="${order.status}"></span></p><p>付款方式：<span th:text="${order.paymentMethod}"></span></p><p>收件地址：<span th:text="${order.shippingAddress}"></span></p><p class="mb-0">總金額：NT$ <strong th:text="${order.totalAmount}"></strong></p></div></div></div><div class="col-lg-8"><div class="card shadow-sm"><div class="card-body"><table class="table"><thead><tr><th>商品</th><th>單價</th><th>數量</th><th>小計</th></tr></thead><tbody><tr th:each="item : ${order.items}"><td th:text="${item.productName}"></td><td th:text="${item.unitPrice}"></td><td th:text="${item.quantity}"></td><td th:text="${item.subtotal}"></td></tr></tbody></table></div></div></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
