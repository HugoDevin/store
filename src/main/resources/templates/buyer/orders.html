<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>My Orders</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><h1 class="h3 mb-4">我的訂單</h1><div class="card shadow-sm"><div class="card-body"><table class="table"><thead><tr><th>#</th><th>建立時間</th><th>狀態</th><th>總金額</th><th></th></tr></thead><tbody><tr th:each="order : ${orders.content}"><td th:text="${order.id}"></td><td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td><td><span class="badge bg-secondary" th:text="${order.status}"></span></td><td th:text="${order.totalAmount}"></td><td><a class="btn btn-outline-primary btn-sm" th:href="@{'/buyer/orders/' + ${order.id}}">查看</a></td></tr></tbody></table></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
