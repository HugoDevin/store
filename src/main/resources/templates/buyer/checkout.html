<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Checkout</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><div class="row g-4"><div class="col-lg-7"><div class="card shadow-sm"><div class="card-body"><h1 class="h4">結帳</h1><form th:action="@{/buyer/orders}" th:object="${checkoutForm}" method="post"><input type="hidden" th:field="*{productId}"><div class="mb-3"><label class="form-label">購買數量</label><input class="form-control" type="number" th:field="*{quantity}" min="1"><div class="text-danger small" th:errors="*{quantity}"></div></div><div class="mb-3"><label class="form-label">收件地址</label><textarea class="form-control" th:field="*{shippingAddress}"></textarea><div class="text-danger small" th:errors="*{shippingAddress}"></div></div><div class="mb-3"><label class="form-label">付款方式</label><select class="form-select" th:field="*{paymentMethod}"><option value="CASH_ON_DELIVERY">貨到付款</option><option value="CREDIT_CARD">信用卡（保留擴充點）</option></select></div><button class="btn btn-success">建立訂單</button></form></div></div></div>
<div class="col-lg-5"><div class="card shadow-sm"><div class="card-body"><h2 class="h5">商品摘要</h2><p class="mb-1"><strong th:text="${product.name}"></strong></p><p class="text-muted" th:text="${product.description}"></p><ul class="list-unstyled"><li>單價：NT$ <span th:text="${product.price}"></span></li><li>庫存：<span th:text="${product.stock}"></span></li><li>小計：NT$ <span th:text="${subtotal}"></span></li></ul></div></div></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
