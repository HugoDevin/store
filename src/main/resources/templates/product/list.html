<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Products</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><div class="d-flex justify-content-between align-items-center mb-4"><div><h1 class="h3 mb-0">商品列表</h1><p class="text-muted mb-0">可直接用 Guest / Buyer 模式瀏覽商品。</p></div><form class="d-flex" method="get"><input class="form-control me-2" name="keyword" th:value="${keyword}" placeholder="搜尋商品"><button class="btn btn-outline-primary">搜尋</button></form></div>
<div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div><div class="alert alert-warning" th:if="${param.error}">權限不足，請使用正確角色登入。</div>
<div class="row g-4"><div class="col-md-4" th:each="product : ${products.content}"><div class="card h-100 card-hover"><div class="card-body"><h5 class="card-title" th:text="${product.name}"></h5><p class="card-text text-muted" th:text="${product.description}"></p><ul class="list-unstyled small"><li>價格：NT$ <span th:text="${product.price}"></span></li><li>庫存：<span th:text="${product.stock}"></span></li><li>狀態：<span class="badge bg-success" th:text="${product.status}"></span></li><li>賣家：<span th:text="${product.sellerName}"></span></li></ul><a class="btn btn-primary btn-sm" th:href="@{'/products/' + ${product.id}}">查看詳情</a></div></div></div></div>
<nav class="mt-4" th:if="${products.totalPages > 1}"><ul class="pagination"><li class="page-item" th:classappend="${products.first} ? 'disabled'"><a class="page-link" th:href="@{/products(page=${products.number-1},keyword=${keyword})}">上一頁</a></li><li class="page-item disabled"><span class="page-link" th:text="${products.number + 1} + ' / ' + ${products.totalPages}"></span></li><li class="page-item" th:classappend="${products.last} ? 'disabled'"><a class="page-link" th:href="@{/products(page=${products.number+1},keyword=${keyword})}">下一頁</a></li></ul></nav>
</main><div th:replace="~{layout/footer :: footer}"></div></body></html>
