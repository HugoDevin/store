<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Product Detail</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><div class="row"><div class="col-lg-8"><div class="card shadow-sm"><div class="card-body"><h1 class="h3" th:text="${product.name}"></h1><p class="text-muted" th:text="${product.description}"></p><div class="row"><div class="col-md-6"><p>價格：<strong>NT$ <span th:text="${product.price}"></span></strong></p><p>庫存：<span th:text="${product.stock}"></span></p></div><div class="col-md-6"><p>賣家：<span th:text="${product.sellerName}"></span></p><p>狀態：<span th:text="${product.status}"></span></p></div></div></div></div></div>
<div class="col-lg-4"><div class="card shadow-sm"><div class="card-body"><h2 class="h5">購買操作</h2><div th:if="${isBuyer and product.status == 'ACTIVE'}"><form th:action="@{/buyer/checkout}" method="get"><input type="hidden" name="productId" th:value="${product.id}"><div class="mb-3"><label class="form-label">數量</label><input class="form-control" type="number" name="quantity" min="1" th:attr="max=${product.stock}" value="1"></div><button class="btn btn-success w-100" th:disabled="${product.stock == 0}">前往結帳</button></form></div>
<div class="alert alert-info" th:if="${!isBuyer}">請先以 Buyer 身份登入後下單。</div><div class="alert alert-warning" th:if="${isBuyer and product.status != 'ACTIVE'}">此商品目前已下架，不可購買。</div></div></div></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
