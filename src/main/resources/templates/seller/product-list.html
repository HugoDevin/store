<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Seller Products</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><div class="d-flex justify-content-between align-items-center mb-4"><h1 class="h3 mb-0">商品管理</h1><a class="btn btn-primary" th:href="@{/seller/products/new}">新增商品</a></div><div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div><div class="card shadow-sm"><div class="card-body"><table class="table"><thead><tr><th>商品名稱</th><th>價格</th><th>庫存</th><th>狀態</th><th>操作</th></tr></thead><tbody><tr th:each="product : ${products}"><td th:text="${product.name}"></td><td th:text="${product.price}"></td><td th:text="${product.stock}"></td><td th:text="${product.status}"></td><td class="d-flex gap-2"><a class="btn btn-outline-primary btn-sm" th:href="@{'/seller/products/' + ${product.id} + '/edit'}">編輯</a><form th:action="@{'/seller/products/' + ${product.id} + '/status'}" method="post"><input type="hidden" name="status" th:value="${product.status == 'ACTIVE' ? 'INACTIVE' : 'ACTIVE'}"><button class="btn btn-outline-secondary btn-sm" th:text="${product.status == 'ACTIVE' ? '下架' : '上架'}"></button></form></td></tr></tbody></table></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
