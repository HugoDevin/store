<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Seller Order Detail</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3">訂單管理 #<span th:text="${order.id}"></span></h1></div><div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div><div class="row g-4"><div class="col-lg-4"><div class="card shadow-sm"><div class="card-body"><p>買家：<span th:text="${order.buyerUsername}"></span></p><p>地址：<span th:text="${order.shippingAddress}"></span></p><p>付款方式：<span th:text="${order.paymentMethod}"></span></p><p>狀態：<strong th:text="${order.status}"></strong></p><p>總金額：NT$ <span th:text="${order.totalAmount}"></span></p><form th:action="@{'/seller/orders/' + ${order.id} + '/status'}" th:object="${updateOrderStatusForm}" method="post"><div class="mb-3"><label class="form-label">更新狀態</label><select class="form-select" th:field="*{status}"><option value="">請選擇</option><option value="CONFIRMED">CONFIRMED</option><option value="SHIPPED">SHIPPED</option><option value="COMPLETED">COMPLETED</option></select><div class="text-danger small" th:errors="*{status}"></div></div><button class="btn btn-primary">更新</button></form></div></div></div><div class="col-lg-8"><div class="card shadow-sm"><div class="card-body"><table class="table"><thead><tr><th>商品快照</th><th>單價</th><th>數量</th><th>小計</th></tr></thead><tbody><tr th:each="item : ${order.items}"><td th:text="${item.productName}"></td><td th:text="${item.unitPrice}"></td><td th:text="${item.quantity}"></td><td th:text="${item.subtotal}"></td></tr></tbody></table></div></div></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
