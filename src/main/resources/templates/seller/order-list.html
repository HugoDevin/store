<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Seller Orders</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><h1 class="h3 mb-3">訂單管理</h1><p class="text-muted">Demo 限制：賣家列表顯示含有自己商品的整筆訂單，未拆分多賣家子訂單。</p><div class="card shadow-sm"><div class="card-body"><table class="table"><thead><tr><th>#</th><th>買家</th><th>狀態</th><th>建立時間</th><th>總金額</th><th></th></tr></thead><tbody><tr th:each="order : ${orders.content}"><td th:text="${order.id}"></td><td th:text="${order.buyerUsername}"></td><td th:text="${order.status}"></td><td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td><td th:text="${order.totalAmount}"></td><td><a class="btn btn-outline-primary btn-sm" th:href="@{'/seller/orders/' + ${order.id}}">詳情</a></td></tr></tbody></table></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
