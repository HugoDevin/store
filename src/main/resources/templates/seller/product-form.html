<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Product Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-4"><div class="card shadow-sm"><div class="card-body"><h1 class="h4" th:text="${isEdit} ? '編輯商品' : '新增商品'"></h1><form th:action="${isEdit} ? @{'/seller/products/' + ${productForm.id} + '/edit'} : @{/seller/products}" th:object="${productForm}" method="post"><input type="hidden" th:field="*{id}"><input type="hidden" th:field="*{version}"><div class="mb-3"><label class="form-label">名稱</label><input class="form-control" th:field="*{name}"><div class="text-danger small" th:errors="*{name}"></div></div><div class="mb-3"><label class="form-label">描述</label><textarea class="form-control" th:field="*{description}"></textarea></div><div class="row"><div class="col-md-6 mb-3"><label class="form-label">價格</label><input class="form-control" type="number" step="0.01" th:field="*{price}"><div class="text-danger small" th:errors="*{price}"></div></div><div class="col-md-6 mb-3"><label class="form-label">庫存</label><input class="form-control" type="number" th:field="*{stock}"><div class="text-danger small" th:errors="*{stock}"></div></div></div><div class="mb-3" th:if="${isEdit}"><label class="form-label">狀態</label><select class="form-select" th:field="*{status}"><option value="ACTIVE">ACTIVE</option><option value="INACTIVE">INACTIVE</option></select></div><button class="btn btn-primary">儲存</button></form></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
