<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Register</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-5"><div class="row justify-content-center"><div class="col-md-6"><div class="card shadow-sm"><div class="card-body"><h2 class="mb-4">註冊</h2>
<form th:action="@{/register}" th:object="${registerForm}" method="post"><div class="mb-3"><label class="form-label">Username</label><input class="form-control" th:field="*{username}"><div class="text-danger small" th:errors="*{username}"></div></div>
<div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" th:field="*{password}"><div class="text-danger small" th:errors="*{password}"></div></div>
<div class="mb-3"><label class="form-label">Confirm Password</label><input class="form-control" type="password" th:field="*{confirmPassword}"><div class="text-danger small" th:errors="*{confirmPassword}"></div></div>
<div class="mb-3"><label class="form-label">Role</label><select class="form-select" th:field="*{role}"><option value="">請選擇</option><option value="BUYER">BUYER</option><option value="SELLER">SELLER</option></select><div class="text-danger small" th:errors="*{role}"></div></div>
<button class="btn btn-primary">建立帳號</button></form></div></div></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
