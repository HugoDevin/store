<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head><body>
<div th:replace="~{layout/header :: header}"></div><main class="container py-5"><div class="row justify-content-center"><div class="col-md-5"><div class="card shadow-sm"><div class="card-body"><h2 class="mb-4">登入</h2>
<div class="alert alert-success" th:if="${param.logout}">已成功登出。</div><div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div><div class="alert alert-danger" th:if="${param.error}">登入失敗，請確認帳號密碼。</div>
<form th:action="@{/login}" method="post"><div class="mb-3"><label class="form-label">Username</label><input class="form-control" name="username"></div><div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password"></div><button class="btn btn-primary w-100">登入</button></form>
<p class="mt-3 mb-0">尚未註冊？<a th:href="@{/register}">前往註冊</a></p></div></div></div></div></main><div th:replace="~{layout/footer :: footer}"></div></body></html>
